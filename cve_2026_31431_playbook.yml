---
# Example playbook for CVE-2026-31431 (Copy Fail) mitigation
# This playbook uses the cve_2026_31431 role with bitwise flags for mitigation control

- name: CVE-2026-31431 Assessment and Mitigation
  hosts: all
  become: true
  gather_facts: true

  # Override role defaults here
  vars:
    # Assessment mode (default: false = assessment only)
    apply_remediation: false

    # Mitigation flags (bitwise):
    #   1 = Module Blacklist
    #   2 = SELinux Policy
    #   4 = systemd seccomp
    #   8 = eBPF LSM (kernel 5.7+)
    #
    # Examples:
    #   mitigation_flags: 1   # Module blacklist only
    #   mitigation_flags: 3   # Module blacklist + SELinux (DEFAULT RECOMMENDED)
    #   mitigation_flags: 7   # Module blacklist + SELinux + seccomp (enhanced protection)
    #   mitigation_flags: 15  # All mitigations (for systems with modern kernels)
    #
    mitigation_flags: 3  # Module blacklist + SELinux (default recommended)

  roles:
    - role: cve_2026_31431

- name: Generate inventory files
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Include inventory generation tasks
      ansible.builtin.include_role:
        name: cve_2026_31431
        tasks_from: inventory_update
      when:
        - generate_inventory | default(false)
        - groups['vulnerable_hosts_for_summary'] is defined
        - groups['vulnerable_hosts_for_summary'] | length > 0

- name: Create dynamic group for vulnerable hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Add vulnerable hosts to dynamic group
      ansible.builtin.group_by:
        key: "{{ 'vulnerable_hosts' if (vulnerable_host | default(false)) else 'safe_hosts' }}"

- name: Generate summary report
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Collect vulnerable hosts
      ansible.builtin.set_fact:
        all_vulnerable: "{{ groups['all'] | map('extract', hostvars, 'vulnerable_host') | select('defined') | list }}"

    - name: Build vulnerable host list
      ansible.builtin.set_fact:
        vulnerable_hostnames: "{{ groups['all'] | select('in', groups.get('vulnerable_hosts', [])) | list }}"

    - name: Collect remediation statistics
      ansible.builtin.set_fact:
        remediation_stats:
          module_blacklist: "{{ groups['all'] | map('extract', hostvars, 'remediation_module_blacklist_applied') | select('defined') | list | length }}"
          selinux: "{{ groups['all'] | map('extract', hostvars, 'remediation_selinux_applied') | select('defined') | list | length }}"
          seccomp: "{{ groups['all'] | map('extract', hostvars, 'remediation_seccomp_applied') | select('defined') | list | length }}"
          ebpf: "{{ groups['all'] | map('extract', hostvars, 'remediation_ebpf_applied') | select('defined') | list | length }}"

    - name: Display final summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "CVE-2026-31431 Summary Report"
          - "=========================================="
          - "Total hosts scanned: {{ groups['all'] | length }}"
          - "Vulnerable hosts: {{ all_vulnerable | length }}"
          - ""
          - "{% if all_vulnerable | length > 0 %}VULNERABLE HOSTS REQUIRING REMEDIATION:{% endif %}"
          - "{% if all_vulnerable | length > 0 %}{{ vulnerable_hostnames | join(', ') }}{% endif %}"
          - ""
          - "{% if apply_remediation | default(false) %}Mitigations Applied:{% endif %}"
          - "{% if apply_remediation | default(false) %}  - Module Blacklist: {{ remediation_stats.module_blacklist }} hosts{% endif %}"
          - "{% if apply_remediation | default(false) %}  - SELinux Policy: {{ remediation_stats.selinux }} hosts{% endif %}"
          - "{% if apply_remediation | default(false) %}  - systemd seccomp: {{ remediation_stats.seccomp }} hosts{% endif %}"
          - "{% if apply_remediation | default(false) %}  - eBPF LSM: {{ remediation_stats.ebpf }} hosts{% endif %}"
          - ""
          - "Assessment Reports:"
          - "  - Per-host details: /root/cve-2026-31431-assessment-<hostname>.txt"
          - "  - JSON reports: /tmp/cve-2026-31431-*.json"
          - ""
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}DEFAULT RECOMMENDED MITIGATION: Flag 3{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  - Module Blacklist (1) + SELinux (2) = Defense-in-depth{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  - Module Blacklist alone can be bypassed by root (via insmod){% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  - SELinux blocks syscall even if blacklist is bypassed{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  - Covers user_t/unconfined_t (vast majority of attack scenarios){% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  - Note: SELinux only covers configured domains; uncovered domains remain at risk{% endif %}"
          - ""
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}TO REMEDIATE WITH RECOMMENDED SETTINGS:{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  ansible-playbook cve_2026_31431_playbook.yml -e apply_remediation=true -e mitigation_flags=3 --limit vulnerable_hosts{% endif %}"
          - ""
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}TO CUSTOMIZE MITIGATION PROFILE:{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  1. Generate inventory: ansible-playbook cve_2026_31431_playbook.yml -e generate_inventory=true{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  2. Update inventory file to override recommended_mitigation_flags per host{% endif %}"
          - "{% if all_vulnerable | length > 0 and not (apply_remediation | default(false)) %}  3. Apply: ansible-playbook -i <inventory> cve_2026_31431_playbook.yml -e apply_remediation=true{% endif %}"
          - "=========================================="
