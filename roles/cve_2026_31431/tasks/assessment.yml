---
# Vulnerability assessment tasks for CVE-2026-31431

- name: Get kernel version
  command: uname -r
  register: kernel_version
  changed_when: false

- name: Parse kernel version
  set_fact:
    kernel_major: "{{ kernel_version.stdout.split('.')[0] | int }}"
    kernel_minor: "{{ kernel_version.stdout.split('.')[1] | int }}"

- name: Check if kernel is potentially vulnerable
  set_fact:
    kernel_in_vuln_range: "{{
      (kernel_major | int > vulnerable_kernel_min_major) or
      (kernel_major | int == vulnerable_kernel_min_major and kernel_minor | int >= vulnerable_kernel_min_minor)
    }}"

- name: Check if algif_aead module exists in kernel
  shell: modinfo algif_aead
  register: algif_aead_modinfo
  changed_when: false
  failed_when: false

- name: Check if algif_aead is currently loaded
  shell: lsmod | grep algif_aead
  register: lsmod_algif_aead
  changed_when: false
  failed_when: false

- name: Check for modules that depend on algif_aead
  shell: |
    if lsmod | grep -q algif_aead; then
      lsmod | awk '$4 ~ /algif_aead/ {print $1}' | grep -v algif_aead || echo "NONE"
    else
      echo "MODULE_NOT_LOADED"
    fi
  register: algif_aead_dependents
  changed_when: false
  failed_when: false

- name: Check for active AF_ALG sockets
  shell: lsof | grep AF_ALG
  register: lsof_af_alg
  changed_when: false
  failed_when: false

- name: Check if algif_aead is blacklisted
  shell: grep -r algif_aead {{ modprobe_config_dir }}/ /usr/lib/modprobe.d/ 2>/dev/null || true
  register: algif_blacklist_check
  changed_when: false
  failed_when: false

- name: Check kernel config for CONFIG_CRYPTO_USER_API_AEAD
  shell: |
    if [ -f /boot/config-{{ kernel_version.stdout }} ]; then
      grep CONFIG_CRYPTO_USER_API_AEAD /boot/config-{{ kernel_version.stdout }} || echo "NOT_FOUND"
    else
      echo "CONFIG_FILE_NOT_FOUND"
    fi
  register: crypto_aead_config
  changed_when: false
  failed_when: false

- name: Check for existing SELinux policy (if SELinux enabled)
  shell: semodule -l | grep {{ selinux_policy_module }} || echo "NOT_INSTALLED"
  register: selinux_policy_check
  changed_when: false
  failed_when: false
  when:
    - ansible_selinux.status is defined
    - ansible_selinux.status == "enabled"

- name: Check for systemd seccomp restrictions
  shell: |
    count=0
    for service in {{ seccomp_protected_services | join(' ') }}; do
      if systemctl show $service.service 2>/dev/null | grep -q "RestrictAddressFamilies.*AF_ALG"; then
        count=$((count + 1))
      fi
    done
    echo $count
  register: seccomp_services_protected
  changed_when: false
  failed_when: false
  when: ansible_service_mgr == "systemd"

- name: Assess CVE-2026-31431 vulnerability status
  set_fact:
    cve_assessment:
      host: "{{ inventory_hostname }}"
      cve_id: "CVE-2026-31431"
      cve_name: "Copy Fail"
      kernel_version: "{{ kernel_version.stdout }}"
      kernel_in_vulnerable_range: "{{ kernel_in_vuln_range }}"
      algif_aead_module_exists: "{{ algif_aead_modinfo.rc == 0 }}"
      algif_aead_currently_loaded: "{{ lsmod_algif_aead.rc == 0 }}"
      dependent_modules: "{{ algif_aead_dependents.stdout }}"
      active_af_alg_sockets: "{{ lsof_af_alg.rc == 0 }}"
      algif_aead_blacklisted: "{{
        'blacklist algif_aead' in algif_blacklist_check.stdout or
        'install algif_aead /bin/true' in algif_blacklist_check.stdout
      }}"
      crypto_config: "{{ crypto_aead_config.stdout }}"
      actively_exploitable: "{{
        kernel_in_vuln_range and
        algif_aead_modinfo.rc == 0 and
        lsmod_algif_aead.rc == 0
      }}"
      potentially_vulnerable: "{{
        kernel_in_vuln_range and
        algif_aead_modinfo.rc == 0
      }}"
      selinux_policy_installed: "{{
        (selinux_policy_check.stdout | default('NOT_INSTALLED')) != 'NOT_INSTALLED'
        if ansible_selinux.status is defined and ansible_selinux.status == 'enabled'
        else false
      }}"
      seccomp_services_count: "{{ seccomp_services_protected.stdout | default('0') | int }}"

- name: Determine vulnerability status
  set_fact:
    vulnerability_status: |
      {% if cve_assessment.kernel_in_vulnerable_range and cve_assessment.algif_aead_module_exists %}
      {% if cve_assessment.algif_aead_blacklisted %}
      MITIGATED - Module is blacklisted
      {% elif cve_assessment.algif_aead_currently_loaded %}
      VULNERABLE - Module is loaded and exploitable
      {% else %}
      VULNERABLE - Module exists and can be loaded
      {% endif %}
      {% elif not cve_assessment.kernel_in_vulnerable_range %}
      NOT VULNERABLE - Kernel too old (pre-2017)
      {% else %}
      NOT VULNERABLE - Module not available
      {% endif %}

- name: Display detailed CVE-2026-31431 assessment
  debug:
    msg:
      - "=========================================="
      - "CVE-2026-31431 (Copy Fail) Assessment"
      - "=========================================="
      - "Host: {{ inventory_hostname }}"
      - "Kernel Version: {{ cve_assessment.kernel_version }}"
      - "Status: {{ vulnerability_status | trim }}"
      - ""
      - "Details:"
      - "  - Kernel in vulnerable range (>=4.10): {{ cve_assessment.kernel_in_vulnerable_range }}"
      - "  - algif_aead module exists: {{ cve_assessment.algif_aead_module_exists }}"
      - "  - algif_aead currently loaded: {{ cve_assessment.algif_aead_currently_loaded }}"
      - "{% if cve_assessment.algif_aead_currently_loaded and cve_assessment.dependent_modules not in ['NONE', 'MODULE_NOT_LOADED'] %}  - Dependent modules: {{ cve_assessment.dependent_modules }}{% endif %}"
      - "  - Active AF_ALG sockets: {{ cve_assessment.active_af_alg_sockets }}"
      - "  - Module blacklisted: {{ cve_assessment.algif_aead_blacklisted }}"
      - "  - SELinux policy installed: {{ cve_assessment.selinux_policy_installed }}"
      - "  - Services with seccomp: {{ cve_assessment.seccomp_services_count }}"
      - ""
      - "{% if cve_assessment.actively_exploitable %}IMMEDIATE ACTION REQUIRED: System is actively vulnerable!{% endif %}"
      - "=========================================="

- name: Flag vulnerable hosts
  set_fact:
    vulnerable_host: true
  when:
    - cve_assessment.potentially_vulnerable
    - not cve_assessment.algif_aead_blacklisted
