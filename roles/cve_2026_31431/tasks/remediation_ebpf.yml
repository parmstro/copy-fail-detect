---
# eBPF LSM remediation for CVE-2026-31431
# Initial implementation by Anthony Green (@atgreen)

- name: "EBPF - Install required packages"
  ansible.builtin.package:
    name:
      - clang
      - llvm
      - libbpf-devel
      - kernel-devel
      - bpftool
    state: present
  when: ansible_os_family == "RedHat"

- name: "EBPF - Create source directory"
  ansible.builtin.file:
    path: "{{ ebpf_src_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "EBPF - Create installation directory"
  ansible.builtin.file:
    path: "{{ ebpf_install_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "EBPF - Copy BPF program source"
  ansible.builtin.template:
    src: block_af_alg_lsm.bpf.c.j2
    dest: "{{ ebpf_src_dir }}/{{ ebpf_program_name }}.bpf.c"
    mode: '0644'
    owner: root
    group: root
  register: ebpf_source

- name: "EBPF - Compile BPF program"
  ansible.builtin.shell: |
    clang -O2 -g -target bpf \
      -D__TARGET_ARCH_x86 \
      -I/usr/include/bpf \
      -c {{ ebpf_src_dir }}/{{ ebpf_program_name }}.bpf.c \
      -o {{ ebpf_install_dir }}/{{ ebpf_program_name }}.bpf.o
  args:
    creates: "{{ ebpf_install_dir }}/{{ ebpf_program_name }}.bpf.o"
  when: ebpf_source is changed
  register: ebpf_compiled
  notify: eBPF LSM program loaded

- name: "EBPF - Load BPF LSM program"
  ansible.builtin.shell: |
    bpftool prog load {{ ebpf_install_dir }}/{{ ebpf_program_name }}.bpf.o \
      {{ bpf_fs }}/{{ ebpf_program_name }} type lsm
  args:
    creates: "{{ bpf_fs }}/{{ ebpf_program_name }}"
  when: ebpf_compiled is changed or ebpf_source is changed
  register: ebpf_loaded
  notify: eBPF LSM program loaded

- name: "EBPF - Verify BPF program is loaded"
  ansible.builtin.command: bpftool prog show
  register: bpftool_show
  changed_when: false
  failed_when: ebpf_program_name not in bpftool_show.stdout
  when: ebpf_loaded is changed

- name: "EBPF - Create systemd service for persistent loading"
  ansible.builtin.template:
    src: ebpf_loader.service.j2
    dest: /etc/systemd/system/cve-2026-31431-ebpf-lsm.service
    mode: '0644'
    owner: root
    group: root
  register: ebpf_service
  notify: eBPF LSM program loaded

- name: "EBPF - Reload systemd daemon"
  ansible.builtin.systemd:
    daemon_reload: true
  when: ebpf_service is changed

- name: "EBPF - Enable and start eBPF loader service"
  ansible.builtin.systemd:
    name: cve-2026-31431-ebpf-lsm.service
    enabled: true
    state: started
  when: ebpf_service is changed or ebpf_loaded is changed

- name: "EBPF - Test AF_ALG blocking"
  ansible.builtin.shell: |
    python3 -c "import socket; socket.socket(38, 2, 0)" 2>&1 || true
  register: ebpf_test
  changed_when: false
  failed_when: false
  when: ebpf_loaded is changed

- name: "EBPF - Display success message"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "EBPF LSM REMEDIATION SUCCESSFUL"
      - "=========================================="
      - "Host: {{ inventory_hostname }}"
      - "Action: eBPF LSM program loaded"
      - "Program: {{ ebpf_program_name }}"
      - "Status: CVE-2026-31431 mitigated (eBPF LSM layer)"
      - ""
      - "Protection Scope:"
      - "  ✓ System-wide AF_ALG socket blocking"
      - "  ✓ Dynamic, programmable policy"
      - "  ✓ Kernel-level enforcement (LSM hook)"
      - "  ✓ Built-in observability and logging"
      - ""
      - "Management:"
      - "  - View programs: bpftool prog list"
      - "  - View logs: cat /sys/kernel/debug/tracing/trace_pipe"
      - "  - Service: systemctl status cve-2026-31431-ebpf-lsm"
      - ""
      - "Next Steps:"
      - "  ✓ eBPF program is active immediately"
      - "  ✓ Program reloads on boot via systemd service"
      - "  → Monitor blocked attempts in kernel trace log"
      - "=========================================="
  when: ebpf_loaded is changed

- name: Set eBPF remediation flag
  ansible.builtin.set_fact:
    remediation_ebpf_applied: true
  when: ebpf_loaded is changed or ebpf_service is changed
