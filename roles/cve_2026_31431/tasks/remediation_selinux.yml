---
# SELinux policy remediation for CVE-2026-31431
# Initial implementation by Greg Procunier (@gprocunier)

- name: "SELINUX - Check if policy is already installed"
  ansible.builtin.command: semodule -l
  register: semodule_list
  changed_when: false
  failed_when: false

- name: "SELINUX - Set policy installation status"
  ansible.builtin.set_fact:
    selinux_policy_already_installed: "{{ selinux_policy_module in semodule_list.stdout }}"

- name: "SELINUX - Install required packages (RedHat)"
  ansible.builtin.package:
    name:
      - policycoreutils
      - policycoreutils-python-utils
      - selinux-policy-devel
      - checkpolicy
    state: present
  when: ansible_os_family == "RedHat"

- name: "SELINUX - Create policy build directory"
  ansible.builtin.file:
    path: "{{ selinux_policy_build_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "SELINUX - Create SELinux policy file"
  ansible.builtin.template:
    src: selinux_policy.te.j2
    dest: "{{ selinux_policy_build_dir }}/{{ selinux_policy_module }}.te"
    mode: '0644'
    owner: root
    group: root
  register: selinux_policy_file

- name: "SELINUX - Create Makefile for policy compilation"
  ansible.builtin.template:
    src: selinux_Makefile.j2
    dest: "{{ selinux_policy_build_dir }}/Makefile"
    mode: '0644'
    owner: root
    group: root

- name: "SELINUX - Compile SELinux policy module"
  ansible.builtin.command: make -C {{ selinux_policy_build_dir }}
  args:
    creates: "{{ selinux_policy_build_dir }}/{{ selinux_policy_module }}.pp"
  when: selinux_policy_file is changed or not selinux_policy_already_installed
  register: selinux_policy_compiled
  notify: SELinux policy applied

- name: "SELINUX - Install SELinux policy module"
  ansible.builtin.command: semodule -i {{ selinux_policy_build_dir }}/{{ selinux_policy_module }}.pp
  when: selinux_policy_compiled is changed or not selinux_policy_already_installed
  register: selinux_policy_installed
  notify: SELinux policy applied

- name: "SELINUX - Verify policy installation"
  ansible.builtin.command: semodule -l
  register: semodule_verify
  changed_when: false
  failed_when: selinux_policy_module not in semodule_verify.stdout
  when: selinux_policy_installed is changed

- name: "SELINUX - Test AF_ALG blocking"
  ansible.builtin.shell: |
    runcon -t user_t -- python3 -c "import socket; socket.socket(38, 2, 0)" 2>&1 || true
  register: selinux_test
  changed_when: false
  failed_when: false
  when: selinux_policy_installed is changed

- name: "SELINUX - Display success message"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "SELINUX POLICY REMEDIATION SUCCESSFUL"
      - "=========================================="
      - "Host: {{ inventory_hostname }}"
      - "Action: SELinux policy installed"
      - "Policy Module: {{ selinux_policy_module }}"
      - "Status: CVE-2026-31431 mitigated (LSM layer)"
      - ""
      - "Protection Scope:"
      - "  ✓ Blocks AF_ALG socket creation at syscall level"
      - "  ✓ Works even if algif_aead module is loaded"
      - "  ✓ Cannot be bypassed from userspace"
      - "  ✓ Provides audit trail of blocked attempts"
      - ""
      - "Next Steps:"
      - "  ✓ Policy is active immediately"
      - "  ✓ Policy persists across reboots"
      - "  → Check audit logs: ausearch -m avc | grep alg_socket"
      - "=========================================="
  when: selinux_policy_installed is changed

- name: Set SELinux remediation flag
  ansible.builtin.set_fact:
    remediation_selinux_applied: true
  when: selinux_policy_installed is changed or selinux_policy_already_installed
