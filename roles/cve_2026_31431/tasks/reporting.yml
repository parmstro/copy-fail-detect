---
# Reporting tasks for CVE-2026-31431

- name: Create enhanced JSON report
  ansible.builtin.set_fact:
    json_report_enhanced:
      assessment: "{{ cve_assessment }}"
      mitigations_applied:
        module_blacklist: "{{ remediation_module_blacklist_applied | default(false) }}"
        selinux: "{{ remediation_selinux_applied | default(false) }}"
        seccomp: "{{ remediation_seccomp_applied | default(false) }}"
        seccomp_service_count: "{{ remediation_seccomp_service_count | default(0) }}"
        ebpf_lsm: "{{ remediation_ebpf_applied | default(false) }}"
      mitigation_flags: "{{ mitigation_flags }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"

- name: Save assessment to local file
  ansible.builtin.copy:
    content: "{{ hostvars[inventory_hostname].json_report_enhanced | to_nice_json }}"
    dest: "{{ report_dir }}/{{ report_filename }}"
  delegate_to: localhost
  become: false

- name: Build list of vulnerable hosts
  ansible.builtin.set_fact:
    _vulnerable_hosts_list: "{{ groups['all'] | select('in', hostvars.keys()) | select('match', '.*') | map('extract', hostvars) | selectattr('vulnerable_host', 'defined') | selectattr('vulnerable_host', 'equalto', true) | map(attribute='inventory_hostname') | list }}"
  run_once: true
  when: not (apply_remediation | default(false) | bool)

- name: Add all vulnerable hosts to group
  ansible.builtin.add_host:
    name: "{{ item }}"
    groups: vulnerable_hosts_for_summary
  loop: "{{ _vulnerable_hosts_list | default([]) }}"
  run_once: true
  when: not (apply_remediation | default(false) | bool)
  # Protection logic defined in assessment.yml sets vulnerable_host fact
  # Host is considered safe (not vulnerable) if it has:
  #   Module Blacklist + at least one non-bypassable protection (SELinux OR seccomp OR eBPF)
  #
  # - Module Blacklist alone CAN be bypassed by root (via insmod)
  # - SELinux, seccomp, and eBPF LSM CANNOT be bypassed by root
  #
  # Coverage gaps to be aware of:
  # - SELinux: Only covers specified domains (user_t, unconfined_t, httpd_t, postgresql_t, mysqld_t)
  #   Attack vectors in uncovered domains could bypass SELinux protection
  # - systemd seccomp: Only protects configured services (httpd, nginx, postgresql, etc.)
  #   Attack vectors outside these services could bypass seccomp protection
  #
  # Recommended: Module Blacklist + SELinux (flag 3) provides most comprehensive protection
  # because user_t and unconfined_t cover the vast majority of attack scenarios

- name: Display vulnerable hosts summary
  ansible.builtin.debug:
    msg:
      - ""
      - "VULNERABLE HOSTS REQUIRING REMEDIATION:"
      - "{{ groups['vulnerable_hosts_for_summary'] | default([]) | join(', ') }}"
      - ""
      - "DEFAULT RECOMMENDED MITIGATION: Flag 3 (Module Blacklist + SELinux)"
      - "  Complete protection requires: Module Blacklist + non-bypassable layer"
      - "  - Module Blacklist alone CAN be bypassed by root (via insmod)"
      - "  - SELinux/seccomp/eBPF CANNOT be bypassed by root"
      - "  - Flag 3 covers user_t/unconfined_t (vast majority of scenarios)"
      - "  - Note: SELinux only covers configured domains; gaps may exist"
      - ""
      - "Per-host assessments saved to: /root/cve-2026-31431-assessment-<hostname>.txt"
  delegate_to: localhost
  run_once: true
  when:
    - groups['vulnerable_hosts_for_summary'] is defined
    - groups['vulnerable_hosts_for_summary'] | length > 0
    - not apply_remediation

- name: Create summary for role execution
  ansible.builtin.set_fact:
    role_summary:
      host: "{{ inventory_hostname }}"
      vulnerability_status: "{{ vulnerability_status | trim }}"
      mitigations_requested: "{{ mitigation_flags }}"
      mitigations_applied:
        - "{% if remediation_module_blacklist_applied | default(false) %}Module Blacklist{% endif %}"
        - "{% if remediation_selinux_applied | default(false) %}SELinux Policy{% endif %}"
        - "{% if remediation_seccomp_applied | default(false) %}systemd seccomp ({{ remediation_seccomp_service_count | default(0) }} services){% endif %}"
        - "{% if remediation_ebpf_applied | default(false) %}eBPF LSM{% endif %}"
      is_vulnerable: "{{ cve_assessment.potentially_vulnerable | default(false) }}"
      is_protected: "{{
        remediation_module_blacklist_applied | default(false) or
        remediation_selinux_applied | default(false) or
        remediation_seccomp_applied | default(false) or
        remediation_ebpf_applied | default(false) or
        cve_assessment.algif_aead_blacklisted | default(false) or
        cve_assessment.selinux_policy_installed | default(false)
      }}"
