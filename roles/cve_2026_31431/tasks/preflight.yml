---
# Pre-flight checks for CVE-2026-31431 role

- name: Check if lsof command exists
  ansible.builtin.command: which lsof
  register: lsof_check
  changed_when: false
  failed_when: false

- name: Check if lsmod command exists
  ansible.builtin.command: which lsmod
  register: lsmod_check
  changed_when: false
  failed_when: false

- name: Install lsof (RedHat family)
  ansible.builtin.package:
    name: lsof
    state: present
  when:
    - lsof_check.rc != 0
    - ansible_os_family == "RedHat"

- name: Install lsof (Debian family)
  ansible.builtin.package:
    name: lsof
    state: present
  when:
    - lsof_check.rc != 0
    - ansible_os_family == "Debian"

- name: Install kmod for lsmod (RedHat family)
  ansible.builtin.package:
    name: kmod
    state: present
  when:
    - lsmod_check.rc != 0
    - ansible_os_family == "RedHat"

- name: Install kmod for lsmod (Debian family)
  ansible.builtin.package:
    name: kmod
    state: present
  when:
    - lsmod_check.rc != 0
    - ansible_os_family == "Debian"

- name: Check for eBPF LSM support (if eBPF mitigation enabled)
  when: flag_ebpf_enabled
  block:
    - name: Check kernel version for eBPF LSM
      ansible.builtin.shell: |
        KERNEL_VER=$(uname -r | cut -d. -f1,2)
        if (( $(echo "$KERNEL_VER >= {{ ebpf_required_kernel }}" | bc -l) )); then
          echo "SUFFICIENT"
        else
          echo "INSUFFICIENT"
        fi
      register: ebpf_kernel_check
      changed_when: false

    - name: Check if CONFIG_BPF_LSM is enabled
      ansible.builtin.shell: grep "CONFIG_BPF_LSM=y" /boot/config-$(uname -r) 2>/dev/null || echo "NOT_ENABLED"
      register: ebpf_config_check
      changed_when: false
      failed_when: false

    - name: Check if BPF LSM is active
      ansible.builtin.shell: grep -q "bpf" /sys/kernel/security/lsm 2>/dev/null && echo "ACTIVE" || echo "INACTIVE"
      register: ebpf_lsm_check
      changed_when: false

    - name: Set eBPF LSM availability flag
      ansible.builtin.set_fact:
        ebpf_lsm_available: "{{
          ebpf_kernel_check.stdout == 'SUFFICIENT' and
          'CONFIG_BPF_LSM=y' in ebpf_config_check.stdout and
          ebpf_lsm_check.stdout == 'ACTIVE'
        }}"

    - name: Display eBPF LSM availability
      ansible.builtin.debug:
        msg:
          - "eBPF LSM Availability Check:"
          - "  Kernel version: {{ ebpf_kernel_check.stdout }}"
          - "  CONFIG_BPF_LSM: {{ 'Enabled' if 'CONFIG_BPF_LSM=y' in ebpf_config_check.stdout else 'Disabled' }}"
          - "  LSM active: {{ ebpf_lsm_check.stdout }}"
          - "  Available: {{ ebpf_lsm_available }}"
      when: ebpf_lsm_check.stdout == "INACTIVE" or ebpf_kernel_check.stdout == "INSUFFICIENT"

- name: Check SELinux status (if SELinux mitigation enabled)
  when: flag_selinux_enabled
  block:
    - name: Get SELinux status
      ansible.builtin.debug:
        msg:
          - "SELinux Status: {{ ansible_selinux.status | default('unknown') }}"
          - "SELinux Mode: {{ ansible_selinux.mode | default('unknown') }}"
      when: ansible_selinux is defined

    - name: Warn if SELinux is disabled
      ansible.builtin.debug:
        msg:
          - "WARNING: SELinux mitigation is enabled but SELinux is not available"
          - "SELinux mitigation will be skipped"
      when:
        - ansible_selinux.status is not defined or ansible_selinux.status != "enabled"

- name: Check systemd availability (if seccomp mitigation enabled)
  when: flag_seccomp_enabled
  block:
    - name: Verify systemd is the service manager
      ansible.builtin.debug:
        msg: "systemd seccomp mitigation available"
      when: ansible_service_mgr == "systemd"

    - name: Warn if systemd is not available
      ansible.builtin.debug:
        msg:
          - "WARNING: systemd seccomp mitigation is enabled but systemd is not the service manager"
          - "Current service manager: {{ ansible_service_mgr }}"
          - "seccomp mitigation will be skipped"
      when: ansible_service_mgr != "systemd"
