---
# tasks file for cve_2026_31431
# Main entry point for CVE-2026-31431 mitigation role

- name: Calculate enabled mitigation flags for display
  ansible.builtin.set_fact:
    flag_module_blacklist_enabled: "{{ ((mitigation_flags | int) // MITIGATE_MODULE_BLACKLIST) % 2 == 1 }}"
    flag_selinux_enabled: "{{ ((mitigation_flags | int) // MITIGATE_SELINUX) % 2 == 1 }}"
    flag_seccomp_enabled: "{{ ((mitigation_flags | int) // MITIGATE_SECCOMP) % 2 == 1 }}"
    flag_ebpf_enabled: "{{ ((mitigation_flags | int) // MITIGATE_EBPF_LSM) % 2 == 1 }}"

- name: Display role execution information
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "CVE-2026-31431 (Copy Fail) Mitigation Role"
      - "=========================================="
      - "Mode: {{ 'Remediation' if apply_remediation else 'Assessment Only' }}"
      - "Mitigation Flags: {{ mitigation_flags }}"
      - "  - Module Blacklist: {{ 'ENABLED' if flag_module_blacklist_enabled else 'disabled' }}"
      - "  - SELinux Policy:   {{ 'ENABLED' if flag_selinux_enabled else 'disabled' }}"
      - "  - systemd seccomp:  {{ 'ENABLED' if flag_seccomp_enabled else 'disabled' }}"
      - "  - eBPF LSM:         {{ 'ENABLED' if flag_ebpf_enabled else 'disabled' }}"
      - "=========================================="

# =============================================================================
# Pre-flight Checks
# =============================================================================
- name: Include pre-flight checks
  ansible.builtin.include_tasks: preflight.yml
  tags:
    - always
    - preflight

# =============================================================================
# Vulnerability Assessment
# =============================================================================
- name: Perform vulnerability assessment
  ansible.builtin.include_tasks: assessment.yml
  when: perform_assessment
  tags:
    - always
    - assessment

# =============================================================================
# Remediation - Module Blacklist
# =============================================================================
- name: Apply module blacklist remediation
  ansible.builtin.include_tasks: remediation_module_blacklist.yml
  when:
    - apply_remediation
    - flag_module_blacklist_enabled
    - cve_assessment.potentially_vulnerable | default(false)
    - not (cve_assessment.algif_aead_blacklisted | default(false))
  tags:
    - remediation
    - module-blacklist

# =============================================================================
# Remediation - SELinux Policy
# =============================================================================
- name: Apply SELinux policy remediation
  ansible.builtin.include_tasks: remediation_selinux.yml
  when:
    - apply_remediation
    - flag_selinux_enabled
    - cve_assessment.potentially_vulnerable | default(false)
    - ansible_selinux.status is defined
    - ansible_selinux.status == "enabled"
  tags:
    - remediation
    - selinux

# =============================================================================
# Remediation - systemd seccomp
# =============================================================================
- name: Apply systemd seccomp remediation
  ansible.builtin.include_tasks: remediation_seccomp.yml
  when:
    - apply_remediation
    - flag_seccomp_enabled
    - ansible_service_mgr == "systemd"
  tags:
    - remediation
    - seccomp

# =============================================================================
# Remediation - eBPF LSM
# =============================================================================
- name: Apply eBPF LSM remediation
  ansible.builtin.include_tasks: remediation_ebpf.yml
  when:
    - apply_remediation
    - flag_ebpf_enabled
    - cve_assessment.potentially_vulnerable | default(false)
    - ebpf_lsm_available | default(false)
  tags:
    - remediation
    - ebpf

# =============================================================================
# Reporting
# =============================================================================
- name: Generate reports
  ansible.builtin.include_tasks: reporting.yml
  tags:
    - always
    - reporting

# =============================================================================
# Cleanup (Optional)
# =============================================================================
- name: Remove remediation configurations
  ansible.builtin.include_tasks: cleanup.yml
  when: remove_remediations
  tags:
    - never
    - cleanup
